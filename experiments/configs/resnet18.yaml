experiment_name: resnet18_baseline
seed: 42

data:
  raw_dir: data/raw
  processed_dir: data/processed
  external_dir: data/external
  class_names: []
  imbalance_strategy: weighted_loss
  augmentation:
    horizontal_flip: true
    vertical_flip: false
    rotation_degrees: 12
    color_jitter: 0.2
    random_resized_crop_scale: [0.8, 1.0]

model:
  architecture: resnet18
  num_classes: 2
  pretrained: true
  freeze_backbone: false
  dropout: 0.2
  checkpoint_path: models/checkpoints/resnet18_best.pt
  registry_path: models/registry/resnet18_latest.pt

training:
  batch_size: 32
  epochs: 10
  learning_rate: 0.0003
  weight_decay: 0.0001
  image_size: 224
  num_workers: 2
  label_smoothing: 0.05
  best_metric: f1_score
  early_stopping_patience: 4

evaluation:
  output_dir: data/processed/evaluation
  top_k: 3
  max_error_samples: 25

mlflow:
  tracking_uri: http://localhost:5000
  experiment_name: vision-mlops-classifier
  run_name: resnet18-baseline

export:
  onnx_path: models/exported/resnet18.onnx
  opset_version: 17
  dynamic_axes: true