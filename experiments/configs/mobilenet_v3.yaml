experiment_name: mobilenet_v3_small_transfer
seed: 42

data:
  raw_dir: data/raw
  processed_dir: data/processed
  external_dir: data/external
  class_names: []
  imbalance_strategy: weighted_loss
  augmentation:
    horizontal_flip: true
    vertical_flip: false
    rotation_degrees: 8
    color_jitter: 0.15
    random_resized_crop_scale: [0.8, 1.0]

model:
  architecture: mobilenet_v3_small
  num_classes: 2
  pretrained: true
  freeze_backbone: false
  dropout: 0.1
  checkpoint_path: models/checkpoints/mobilenet_v3_small_best.pt
  registry_path: models/registry/mobilenet_v3_small_latest.pt

training:
  batch_size: 48
  epochs: 15
  learning_rate: 0.0005
  weight_decay: 0.0001
  image_size: 224
  num_workers: 2
  label_smoothing: 0.02
  best_metric: f1_score
  early_stopping_patience: 5

evaluation:
  output_dir: data/processed/evaluation
  top_k: 3
  max_error_samples: 25

mlflow:
  tracking_uri: http://localhost:5000
  experiment_name: vision-mlops-classifier
  run_name: mobilenet-v3-small-transfer

export:
  onnx_path: models/exported/mobilenet_v3_small.onnx
  opset_version: 17
  dynamic_axes: true