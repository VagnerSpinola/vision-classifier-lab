services:
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./:/workspace
    depends_on:
      - mlflow
      - prometheus
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.20.1
    ports:
      - "5000:5000"
    volumes:
      - ./models:/mlflow/artifacts
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow/artifacts

  prometheus:
    image: prom/prometheus:v3.2.1
    ports:
      - "9090:9090"
    volumes:
      - ./mlops/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.5.2
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - ./mlops/monitoring/grafana_dashboard.json:/var/lib/grafana/dashboards/vision_classifier_dashboard.json:ro